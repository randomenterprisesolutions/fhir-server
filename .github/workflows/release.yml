name: Build and Release

on:
  push:
    tags:
      - '*.*'
    paths-ignore:
    - 'docs/**'
    - 'demo/**'
    - '.github/workflows/site.yml'
    - '.github/workflows/javadocs.yml'

permissions:
  contents: write
  packages: write

jobs:
  release-on-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [ '11' ]
      fail-fast: false
    steps:
    - name: Checkout the Main Branch
      uses: actions/checkout@v6.0.2
      with:
        ref: refs/heads/main
        fetch-depth: 1
    - name: Setup java
      uses: actions/setup-java@v5.2.0
      with:
        distribution: 'temurin'
        java-version: ${{ matrix.java }}
        cache: 'maven'
    - name: Build
      run: |
        mvn -B install --file fhir-examples --no-transfer-progress -DskipTests -Dmaven.wagon.http.retryHandler.count=3
        mvn -B install --file fhir-parent -DskipTests -P include-fhir-igs,integration --no-transfer-progress -Dmaven.wagon.http.retryHandler.count=3
    - name: Generate SBOM
      run: |
        mvn -B org.cyclonedx:cyclonedx-maven-plugin:makeAggregateBom \
          -f fhir-parent \
          -DoutputFormat=json \
          -DoutputName=fhir-server-sbom \
          --no-transfer-progress
        cp fhir-parent/target/fhir-server-sbom.json fhir-server-sbom.json
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v4.0.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Build and push Linux Docker image
      run: |
        TAG=${GITHUB_REF_NAME}
        IMAGE=ghcr.io/${{ github.repository_owner }}/fhir-server
        docker build fhir-install --build-arg VERBOSE=false -t ${IMAGE}:${TAG} -t ${IMAGE}:latest
        docker push ${IMAGE}:${TAG}
        docker push ${IMAGE}:latest
    - name: Create GitHub Release with Windows distribution zip and SBOM
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release create "${GITHUB_REF_NAME}" \
          --title "${GITHUB_REF_NAME}" \
          --generate-notes \
          fhir-install/target/fhir-server-distribution.zip#fhir-server-distribution-windows.zip \
          fhir-server-sbom.json#fhir-server-sbom.json